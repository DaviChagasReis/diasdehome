<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calendário Home Office</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
}

h1 {
    text-align: center;
}

/* LEGENDA */
.legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
}

.box {
    width: 15px;
    height: 15px;
    border-radius: 3px;
}

.red { background: red; }
.green { background: green; }
.black { background: black; }

/* CALENDÁRIO */
.year {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.month {
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

.month h2 {
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
}

.day {
    text-align: center;
    padding: 5px;
    font-size: 12px;
}

.header {
    font-weight: bold;
    background: #ddd;
}

/* CORES */
.ho {
    color: red;
    font-weight: bold;
}

.weekend {
    color: green;
    font-weight: bold;
}

.normal {
    color: black;
}
</style>
</head>

<body>

<h1>Calendário Home Office (Mar/2026 → Mar/2027)</h1>

<!-- 🔥 LEGENDA -->
<div class="legend">
    <div class="legend-item">
        <div class="box red"></div> Home Office
    </div>
    <div class="legend-item">
        <div class="box green"></div> Final de Semana
    </div>
    <div class="legend-item">
        <div class="box black"></div> Dia Normal
    </div>
</div>

<div class="year" id="calendar"></div>

<script>
const hoDates = [
"2026-03-25","2026-04-02","2026-04-09","2026-04-17","2026-04-24","2026-04-27",
"2026-05-05","2026-05-13","2026-05-20","2026-05-28","2026-06-04","2026-06-12",
"2026-06-19","2026-06-22","2026-06-30","2026-07-08","2026-07-15","2026-07-23",
"2026-07-30","2026-08-07","2026-08-14","2026-08-17","2026-08-25","2026-09-02",
"2026-09-09","2026-09-17","2026-09-24","2026-10-02","2026-10-09","2026-10-12",
"2026-10-20","2026-10-28","2026-11-04","2026-11-12","2026-11-19","2026-11-27",
"2026-12-04","2026-12-07","2026-12-15","2026-12-23","2026-12-30","2027-01-08",
"2027-01-11","2027-01-19","2027-01-27","2027-02-03","2027-02-11","2027-02-18",
"2027-02-26","2027-03-05","2027-03-08","2027-03-16","2027-03-24","2027-03-31"
];

const calendar = document.getElementById("calendar");

const monthNames = [
"Janeiro","Fevereiro","Março","Abril","Maio","Junho",
"Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
];

const daysHeader = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

function createMonth(year, month) {
    const container = document.createElement("div");
    container.className = "month";

    const title = document.createElement("h2");
    title.innerText = monthNames[month] + " " + year;
    container.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "grid";

    daysHeader.forEach(d => {
        const el = document.createElement("div");
        el.className = "day header";
        el.innerText = d;
        grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement("div"));
    }

    for (let day = 1; day <= lastDate; day++) {
        const date = new Date(year, month, day);
        const iso = date.toISOString().split("T")[0];

        const div = document.createElement("div");
        div.classList.add("day");

        let cls = "normal";

        if (date.getDay() === 0 || date.getDay() === 6) {
            cls = "weekend";
        }

        if (hoDates.includes(iso)) {
            cls = "ho";
        }

        div.classList.add(cls);
        div.innerText = day;

        grid.appendChild(div);
    }

    container.appendChild(grid);
    return container;
}

let start = new Date(2026, 2);
let end = new Date(2027, 2);

let current = new Date(start);

while (current <= end) {
    calendar.appendChild(createMonth(current.getFullYear(), current.getMonth()));
    current.setMonth(current.getMonth() + 1);
}
</script>

</body>
</html>
